services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xianyu}
      POSTGRES_USER: ${POSTGRES_USER:-xianyu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  hermes-mcp-server:
    image: python:3.12-slim
    working_dir: /workspace
    command: sh -lc "pip install fastapi uvicorn pydantic && PYTHONPATH=apps/hermes-mcp-server python -m app.main"
    volumes:
      - ../..:/workspace
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  automation-worker:
    image: python:3.12-slim
    working_dir: /workspace
    command: sh -lc "PYTHONPATH=apps/automation-worker python -m app.main"
    volumes:
      - ../..:/workspace
    depends_on:
      - redis

volumes:
  postgres_data:
  minio_data:
